{% extends 'base.html' %}

{% block title %}Editar {{ juego.nombre }}{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto py-10 px-4">
    <div class="bg-white rounded-2xl shadow-lg p-8 border border-gray-200">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Editar juego</h1>

        <form method="post" class="space-y-6">
            {% csrf_token %}

            <div>
                <label for="{{ form.nombre.id_for_label }}" class="block text-sm font-semibold text-gray-700 mb-2">
                    Nombre
                </label>
                {{ form.nombre }}
                {% if form.nombre.errors %}
                    <p class="text-red-500 text-sm mt-1">{{ form.nombre.errors.0 }}</p>
                {% endif %}
            </div>

            <div class="flex gap-4">
                <button type="submit"
                        class="bg-green-600 hover:bg-green-700 text-white px-5 py-3 rounded-xl font-semibold">
                    Guardar cambios
                </button>

                <a href="{% url 'detalle_juego' juego.id %}"
                   class="bg-gray-700 hover:bg-gray-800 text-white px-5 py-3 rounded-xl">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
