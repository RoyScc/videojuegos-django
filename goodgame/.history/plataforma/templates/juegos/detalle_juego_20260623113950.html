{% extends 'base.html' %}

{% block title %}{{ juego.nombre }}{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto py-10 px-4">
    <div class="bg-white rounded-2xl shadow-lg p-8 border border-gray-200">
        <h1 class="text-3xl font-bold text-gray-800 mb-4">{{ juego.nombre }}</h1>

        <p class="text-gray-600 mb-2">
            <span class="font-semibold">ID interno:</span> {{ juego.id }}
        </p>

        <p class="text-gray-600 mb-6">
            <span class="font-semibold">Steam AppID:</span> {{ juego.steam_appid }}
        </p>

        {% if user.is_staff %}
            <div class="flex gap-3">
                <a href="{% url 'detalle_juego' juego.id %}"
                class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">
                    Ver
                </a>
                <a href="{% url 'editar_juego' juego.id %}"
                class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-2 rounded-lg">
                    Editar
                </a>
                <a href="{% url 'borrar_juego' juego.id %}"
                class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg">
                    Borrar
                </a>
            </div>
        {% endif %}
    </div>
</div>
{% endblock %}
