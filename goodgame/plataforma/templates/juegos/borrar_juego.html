{% extends 'base.html' %}

{% block title %}Borrar {{ juego.nombre }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto py-10 px-4">
    <div class="bg-white rounded-2xl shadow-lg p-8 border border-gray-200">
        <h1 class="text-3xl font-bold text-red-600 mb-4">Borrar juego</h1>

        <p class="text-gray-700 mb-6">
            ¿Estás seguro de que querés borrar <span class="font-bold">{{ juego.nombre }}</span>?
        </p>

        <form method="post" class="flex gap-4">
            {% csrf_token %}
            <button type="submit"
                    class="bg-red-600 hover:bg-red-700 text-white px-5 py-3 rounded-xl font-semibold">
                Sí, borrar
            </button>

            <a href="{% url 'detalle_juego' juego.id %}"
               class="bg-gray-700 hover:bg-gray-800 text-white px-5 py-3 rounded-xl">
                Cancelar
            </a>
        </form>
    </div>
</div>
{% endblock %}
